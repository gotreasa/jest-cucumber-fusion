name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - master
      - 'releases/*'
  workflow_dispatch:

jobs:
  prettier:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        # Make sure the actual branch is checked out when running on pull requests
        ref: ${{ github.head_ref }}

    - name: Prettify code
      uses: creyD/prettier_action@v3.3
      with:
        # This part is also where you can pass other options, for example:
        prettier_options: --check **/*.{js,md,ts}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  integration:
    runs-on: ubuntu-latest
    # semantic-release pushes the version tag, creates the GitHub release, and
    # comments on released issues/PRs — all of which need write access. The
    # default GITHUB_TOKEN is read-only, which caused EGITNOPERMISSION.
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
    - name: Checking code
      uses: actions/checkout@v5
      with:
        # semantic-release needs full history + tags to determine the release
        fetch-depth: 0

    - name: Setup Node
      uses: actions/setup-node@v5
      with:
        node-version: 24

    - name: Integrating
      run: npm ci

    - name: Testing
      run: npm test

    - name: Type checking
      run: npm run test-d

    - name: Code coverage
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Releasing
      run: npx semantic-release
      env:
        GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
        NPM_TOKEN:        ${{ secrets.NPM_TOKEN }}
